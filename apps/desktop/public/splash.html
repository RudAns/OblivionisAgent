<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title></title>
    <style>
      /* 闪屏固定浅色，与窗口原生 backgroundColor(#f1eee6) 一致。
         原生底色是静态的、跟不了主题:之前深色原生底 + 浅色网页首帧 = 先闪一下黑。
         固定浅色后原生↔网页第一帧就一致,不再闪黑;图标已内联 base64,随首帧出现。 */
      html {
        background: #f1eee6;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(120% 120% at 50% 30%, #fbfaf7 0%, #f1eee6 75%);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        animation: splash-in 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
      }
      .splash-img {
        width: 184px;
        height: 184px;
        border-radius: 36px;
        object-fit: cover;
        box-shadow: 0 16px 46px rgba(60, 55, 45, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.05);
        animation: splash-bob 2.4s ease-in-out infinite;
      }
      .splash-name {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #25231f;
      }
      .splash-name span {
        color: #d96745;
      }
      .splash-bar {
        width: 208px;
        height: 5px;
        border-radius: 3px;
        background: rgba(150, 150, 150, 0.22);
        overflow: hidden;
      }
      .splash-bar i {
        display: block;
        height: 100%;
        width: 100%;
        border-radius: 3px;
        background: #d96745;
        transform-origin: left center;
        /* 3 秒走满，与主窗 3s 后弹出对齐 */
        animation: splash-fill 3s linear forwards;
      }
      @keyframes splash-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes splash-bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @keyframes splash-fill {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-img,
        .splash-bar i,
        .splash-inner {
          animation: none;
        }
      }
    </style>
  </head>
