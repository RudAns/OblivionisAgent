<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OblivionisAgent</title>
    <script>
      // 启动前先定主题，避免深↔浅切换闪一下。system 跟随系统亮/暗。
      (function () {
        try {
          var t = localStorage.getItem("oblivionis-theme") || "dark";
          var r =
            t === "light" || (t === "system" && window.matchMedia("(prefers-color-scheme: light)").matches)
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", r);
        } catch (e) {}
      })();
    </script>
    <style>
      /* 启动闪屏：随窗口一出现就盖住，遮住 React 挂载 + 引擎连接的 2-3s 空窗，加载好后由 JS 淡出移除 */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(120% 120% at 50% 30%, #1b1f27 0%, #101216 72%);
      }
      :root[data-theme="light"] #splash {
        background: radial-gradient(120% 120% at 50% 30%, #fbfaf7 0%, #f1eee6 75%);
      }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        animation: splash-in 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
      }
      .splash-img {
        width: 140px;
        height: 140px;
        border-radius: 28px;
        object-fit: cover;
        box-shadow: 0 14px 44px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
        animation: splash-bob 2.4s ease-in-out infinite;
      }
      :root[data-theme="light"] .splash-img {
        box-shadow: 0 14px 40px rgba(60, 55, 45, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.05);
      }
      .splash-name {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #e6e6e6;
      }
      .splash-name span {
        color: #d96745;
      }
      :root[data-theme="light"] .splash-name {
        color: #25231f;
      }
      .splash-bar {
        width: 180px;
        height: 4px;
        border-radius: 2px;
        background: rgba(150, 150, 150, 0.22);
        overflow: hidden;
      }
      .splash-bar i {
        display: block;
        height: 100%;
        width: 100%;
        border-radius: 2px;
        background: #d96745;
        transform-origin: left center;
        /* 3 秒走满，与主窗 3s 后弹出对齐 */
        animation: splash-fill 3s linear forwards;
      }
      @keyframes splash-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes splash-bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @keyframes splash-fill {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-img,
        .splash-bar i,
        .splash-inner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <div class="splash-inner">
        <img class="splash-img" src="/splash-icon.png" alt="" />
        <div class="splash-name">Oblivionis<span>Agent</span></div>
        <div class="splash-bar"><i></i></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
