name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck (shared / bridge / desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all workspaces
        run: pnpm -r --if-present typecheck

# 说明：CI 只跑 TS 类型检查（快、零原生依赖）。
# Tauri/Rust 原生构建需要平台 SDK，留给本地 `rebuild-deploy.bat` 与发布流程，不在 CI 内做。
