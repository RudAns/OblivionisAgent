name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck (shared / bridge / desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all workspaces
        run: pnpm -r --if-present typecheck

  cargo-deny:
    name: cargo-deny (依赖许可证 / 安全公告)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: apps/desktop/src-tauri/Cargo.toml

# 说明：CI 跑 ① TS 类型检查（快、零原生依赖）② cargo-deny（只读 lockfile 审依赖许可证/安全公告，不编译、无需平台 SDK）。
# Tauri/Rust 原生构建 + clippy 需平台 SDK，留给本地 rebuild-deploy.bat 与 release.mjs（已内置 clippy 零警告闸），不在 PR CI 内做。
