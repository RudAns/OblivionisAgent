# cargo-deny —— 依赖「许可证不兼容 / 已知漏洞 / 异常来源」的自动闸。
# 思路学自 OTTY (otty-shell/otty) 的工程质量门；切合本项目 GPL-3.0 + 第三方许可合规的关注点。
# 本地：在本目录跑 `cargo deny check`  ·  CI：见 .github/workflows/ci.yml 的 cargo-deny job。

[graph]
# 只审真正会编译进 Windows 产物的依赖（本项目只发 Windows）
targets = [{ triple = "x86_64-pc-windows-msvc" }]

[licenses]
# 允许出现在依赖里的许可证（全宽松 + 弱 copyleft MPL-2.0；本项目 GPL-3.0 可兼容打包它们）。
# 不在表里的 = 报错，逼人显式审一遍，别让强 copyleft / 未知许可证悄悄混进发行物。
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
  "0BSD",
]
confidence-threshold = 0.9
# 本工作区自己的 crate（oblivionis-desktop，未发布到 crates.io）不参与依赖许可证审查
private = { ignore = true }

[advisories]
# 有已知安全公告的依赖、或被 yank 的版本 → 卡住（RUSTSEC 公告库由 cargo-deny 自动拉取）。
# 真正的漏洞(vulnerability) / yanked 一律卡死；"unmaintained" 只盯**自己直接依赖**的——
# 深层 transitive 的不可控老 crate(unic-*/serial 等来自 Tauri 链)不因此 fail，避免误伤。
yanked = "deny"
unmaintained = "workspace"

[bans]
multiple-versions = "warn" # 同一 crate 多版本只告警（避免噪音），不卡
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
